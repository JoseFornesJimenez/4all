# ─── CI/CD: Build & Deploy 4all Backend ──────────────────────────────────────
# Disparo: push a main con cambios en backend/**
# Pasos:
#   1. Build imagen Docker desde ./backend  (runner de GitHub, en la nube)
#   2. Push a ghcr.io/josefornesjimenez/4all-backend:latest
#   3. El self-hosted runner en .46 ejecuta kubectl rollout restart
name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/josefornesjimenez/4all-backend

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to k3s
    # Self-hosted runner en 192.168.1.46 — tiene kubectl configurado y acceso al cluster
    runs-on: self-hosted
    needs: build-and-push

    steps:
      - name: Rollout restart
        run: |
          kubectl rollout restart deployment/4all-backend -n 4all
          kubectl rollout status deployment/4all-backend -n 4all --timeout=120s
