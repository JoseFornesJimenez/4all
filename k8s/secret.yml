# ─── Secret: 4all-backend ─────────────────────────────────────────────────────
# IMPORTANTE: Este fichero es solo una PLANTILLA con la estructura.
# NO subas valores reales a Git.
#
# Para crear el secret con valores reales ejecuta:
#   kubectl create secret generic 4all-backend-secret \
#     --namespace=4all \
#     --from-literal=DATABASE_URL='postgresql://postgres:PASSWORD@192.168.1.47:5432/postgres' \
#     --from-literal=JWT_SECRET='tu_jwt_secret_muy_largo' \
#     --from-literal=JWT_EXPIRES_IN='7d' \
#     --from-literal=CORS_ORIGIN='*'
#
# O bien edita este fichero con los valores en base64:
#   echo -n 'valor' | base64
# y aplícalo con: kubectl apply -f secret.yml
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: 4all-backend-secret
  namespace: 4all
type: Opaque
data:
  # Todos los valores deben estar en base64
  # echo -n 'postgresql://postgres:PASSWORD@192.168.1.47:5432/postgres' | base64
  DATABASE_URL: <BASE64_DATABASE_URL>

  # echo -n 'tu_jwt_secret_muy_largo_y_aleatorio' | base64
  JWT_SECRET: <BASE64_JWT_SECRET>

  # echo -n '7d' | base64  →  N2Q=
  JWT_EXPIRES_IN: N2Q=

  # echo -n '*' | base64  →  Kg==
  CORS_ORIGIN: Kg==
