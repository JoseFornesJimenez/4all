services:

  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: 4all-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-4all_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"          # Expuesto para poder usar Prisma Studio localmente
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Backend Express ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: 4all-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy   # Espera a que Postgres esté listo
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-4all_db}
      JWT_SECRET: ${JWT_SECRET:-cambia_esto_en_produccion}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 3008
      NODE_ENV: ${NODE_ENV:-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    ports:
      - "3008:3008"
    volumes:
      - ./backend/src:/app/src         # Hot-reload en desarrollo (opcional)

  # ─── Prisma Studio (interfaz visual de la BD) ─────────────────────────────
  prisma-studio:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: 4all-prisma-studio
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-4all_db}
    ports:
      - "5555:5555"
    command: ["npx", "prisma", "studio", "--port", "5555", "--hostname", "0.0.0.0"]
    profiles:
      - tools                          # Solo arranca si haces: docker compose --profile tools up

volumes:
  postgres_data:
